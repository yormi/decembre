      ℹ

    <button id="page-week" onclick="setPage('week')" style="display:none; background:none; border:none; padding:6px 10px; font-family:inherit; font-size:12px; font-weight:500; cursor:pointer; color:var(--text-muted); transition:color 0.2s;">
      📅 Semaine

    <button id="page-diagnostic" onclick="setPage('diagnostic')" style="display:none; background:none; border:none; padding:6px 10px; font-family:inherit; font-size:12px; font-weight:500; cursor:pointer; color:var(--text-muted); transition:color 0.2s;">

    <button id="page-nutriment" onclick="setPage('nutriment')" style="display:none; background:none; border:none; padding:6px 10px; font-family:inherit; font-size:12px; font-weight:500; cursor:pointer; color:var(--text-muted); transition:color 0.2s;">

      📜 Historique nutriments

    <button id="page-rendement" onclick="setPage('rendement')" style="display:none; background:none; border:none; padding:6px 10px; font-family:inherit; font-size:12px; font-weight:500; cursor:pointer; color:var(--text-muted); transition:color 0.2s;">
      🥬 Rendement semis
    </button>
  </div>

  <!-- Primary section nav. Irrigation is admin-only (revealed by applyAdminMode). -->
