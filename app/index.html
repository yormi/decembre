<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferme Décembre — Système d'opération</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6560;
    --accent-tomato: #c0392b;
    --accent-tomato-light: #fdf0ef;
    --accent-tomato-border: #e8c8c4;
    --accent-lettuce: #27874a;
    --accent-lettuce-light: #eef7f1;
    --accent-lettuce-border: #b8d9c4;
    --accent-nursery: #6b8f3a;
    --accent-nursery-light: #f2f5ec;
    --accent-nursery-border: #c8d4ac;
    --accent-active: var(--accent-tomato);
    --accent-active-light: var(--accent-tomato-light);
    --accent-active-border: var(--accent-tomato-border);
    --warning-bg: #fef5ec;
    --border: #e0dbd4;
    --input-bg: #faf8f5;
    --step-line: #d4cfc7;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --radius: 10px;
    --radius-sm: 6px;
    --blue: #2c6fba;
    --blue-light: #edf3fa;
    --blue-border: #b8d0e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }
  .header { text-align: center; padding: 24px 0 20px; }
  .header-label { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.3; }

<!-- @include app/operator/page.css -->

  /* Cards */
  .card { background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .card-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 14px; }
  .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .input-group { flex: 1; }
  .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
  .input-group input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 15px; background: var(--input-bg); color: var(--text); transition: border-color 0.2s; -webkit-appearance: none; }
  .input-group input:focus { outline: none; border-color: var(--accent-active); }
  .input-unit { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .result-box { background: var(--accent-active-light); border: 1.5px solid var(--accent-active-border); border-radius: var(--radius-sm); padding: 14px; margin-top: 4px; }
  .result-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 4px; }
  .result-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 700; color: var(--text); }
  .result-detail { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }
  .warning-box { background: var(--warning-bg); border: 1.5px solid #f0c899; border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 12px; font-size: 12.5px; line-height: 1.5; color: #8a5a1e; }
  .warning-box strong { color: #b06a1a; }

  /* Steps */
  .steps-list { list-style: none; position: relative; padding-left: 28px; }
  .steps-list::before { content: ''; position: absolute; left: 10px; top: 24px; bottom: 24px; width: 2px; background: var(--step-line); }
  .step-item { position: relative; padding: 10px 0; }
  .step-number { position: absolute; left: -28px; top: 10px; width: 22px; height: 22px; border-radius: 50%; background: var(--card); border: 2px solid var(--step-line); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-muted); z-index: 1; }
  .step-item.step-acid .step-number { border-color: var(--accent-active); color: var(--accent-active); background: var(--accent-active-light); }
  .step-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .step-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.45; }
  .step-amount { font-family: 'DM Mono', monospace; font-weight: 600; font-size: 13px; color: var(--text); background: var(--input-bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; display: inline-block; margin-top: 4px; }

  /* Stage selector */
  .stage-selector { display: flex; gap: 4px; margin-bottom: 12px; }
  .stage-btn { flex: 1; min-width: 0; padding: 8px 4px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--card); color: var(--text-muted); transition: all 0.2s; text-align: center; }
  .stage-btn.active { border-color: var(--accent-active); background: var(--accent-active-light); color: var(--text); }
  .stage-btn .stage-label { display: block; font-size: 13px; font-weight: 700; }
  .stage-btn .stage-weeks { display: block; font-size: 9px; font-weight: 500; margin-top: 2px; opacity: 0.7; }

  /* Multi row */
  .multi-row { display: flex; align-items: center; gap: 10px; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 12px; }
  .multi-row label { font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
  .multi-row input { width: 65px; padding: 6px 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 14px; background: var(--card); color: var(--text); text-align: center; }
  .multi-row input:focus { outline: none; border-color: var(--accent-active); }
  .multi-row .multi-unit { font-size: 11px; color: var(--text-muted); line-height: 1.3; }

  /* Info chips */
  .bed-info { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .bed-info-chip { font-size: 12px; font-weight: 600; color: var(--text-muted); background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-family: 'DM Mono', monospace; }

  /* Irrigation cards */
  .irr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .irr-card { background: var(--blue-light); border: 1.5px solid var(--blue-border); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
  .irr-card .irr-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 6px; }
  .irr-card .irr-value { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 700; color: var(--text); }
  .irr-card .irr-unit { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Param rows */
  .param-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .param-row:last-child { border-bottom: none; }
  .param-row .param-label { color: var(--text-muted); }
  .param-row .param-value { font-family: 'DM Mono', monospace; font-weight: 600; }

  .footer { text-align: center; padding: 20px 0; font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; }

  /* Week schedule view */
  .week-day { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .week-day:last-child { border-bottom: none; }
  .week-day-label { flex: 0 0 56px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding-top: 4px; }
  .week-day.is-today .week-day-label { color: var(--accent-active); }
  .week-day-tasks { flex: 1; min-width: 0; }
  .week-task { display: block; width: 100%; text-align: left; background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 6px; font-family: inherit; cursor: pointer; transition: all 0.15s; }
  .week-task:last-child { margin-bottom: 0; }
  .week-task:hover { border-color: var(--accent-active); }
  .week-task.is-today { border-color: var(--accent-active); background: var(--accent-active-light); }
  .week-task-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .week-task-meta { font-size: 11.5px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .week-task-empty { font-size: 12px; color: var(--text-muted); font-style: italic; padding: 6px 0; }
  /* Diagnostic page */
  .diag-rule { background: var(--blue-light); border: 1.5px solid var(--blue-border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 12px; font-size: 12.5px; line-height: 1.5; color: var(--text); }
  .diag-rule strong { color: var(--text); }
  .diag-rule-title { font-weight: 700; margin-bottom: 6px; }
  .diag-loc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .diag-loc-btn { padding: 12px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--card); font-family: inherit; cursor: pointer; transition: all 0.15s; text-align: left; }
  .diag-loc-btn:hover { border-color: var(--accent-active); }
  .diag-loc-btn.selected { border-color: var(--accent-active); background: var(--accent-active-light); }
  .diag-loc-label { font-size: 13.5px; font-weight: 700; color: var(--text); display: block; }
  .diag-loc-sub { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; line-height: 1.3; }
  .diag-symptom-list { display: flex; flex-direction: column; gap: 8px; }
  .diag-symptom { width: 100%; text-align: left; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-family: inherit; cursor: pointer; transition: all 0.15s; }
  .diag-symptom:hover { border-color: var(--accent-active); }
  .diag-symptom.selected { border-color: var(--accent-active); background: var(--accent-active-light); }
  .diag-symptom-title { font-size: 13.5px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.35; }
  .diag-symptom-detail { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
  .diag-result { background: var(--accent-active-light); border: 1.5px solid var(--accent-active-border); border-radius: var(--radius-sm); padding: 14px 16px; }
  .diag-result-cause { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .diag-cert { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; margin-left: 6px; vertical-align: 2px; letter-spacing: 0.3px; }
  .diag-cert-5 { background: #d4f1d8; color: #1e6b2d; }
  .diag-cert-4 { background: #e8eed4; color: #5a6b1e; }
  .diag-cert-3 { background: #fef0d8; color: #8a5a1e; }
  .diag-cert-2 { background: #fce5d4; color: #8a3e1e; }
  .diag-cert-1 { background: #fce5d4; color: #8a3e1e; }
  .diag-cert-0 { background: #f0f0f0; color: #555; }
  /* Pourquoi modal — opened on row click in Bilan tables. Single instance at end of body. */
  .pq-modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 1000; }
  .pq-modal.open { display: flex; }
  .pq-modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); }
  .pq-modal-content { position: relative; background: var(--bg, #fff); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; max-width: 480px; width: calc(100% - 32px); max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .pq-modal-close { position: absolute; top: 8px; right: 12px; background: none; border: none; font-size: 22px; line-height: 1; color: var(--text-muted); cursor: pointer; padding: 4px 8px; }
  .pq-modal-close:hover { color: var(--text); }
  .pq-modal-title { font-size: 14px; font-weight: 700; color: var(--text); margin: 0 30px 10px 0; line-height: 1.3; }
  .pq-modal-eq { font-family: 'DM Mono', monospace; font-size: 11.5px; color: var(--text); background: var(--input-bg); padding: 8px 10px; border-radius: 4px; border-left: 2px solid var(--border); margin-bottom: 8px; word-break: break-word; }
  .pq-modal-plugged { font-family: 'DM Mono', monospace; font-size: 11.5px; color: var(--text-muted); padding: 8px 10px; margin-bottom: 10px; word-break: break-word; }
  .pq-modal-interpolation { font-size: 12.5px; color: var(--text); line-height: 1.55; font-style: italic; }
  /* Clickable Bilan rows — subtle hover affordance */
  .pq-row { cursor: pointer; transition: background 0.12s; }
  .pq-row:hover { background: var(--input-bg); }
  .diag-result-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--accent-active-border); }
  .diag-result-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 5px; }
  .diag-result-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .diag-result-text ul { margin: 4px 0 0 18px; padding: 0; }
  .diag-result-text li { margin: 3px 0; }
  .diag-reset { display: block; width: 100%; margin-top: 12px; padding: 9px; background: transparent; border: 1px dashed var(--border); border-radius: var(--radius-sm); color: var(--text-muted); font-family: inherit; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .diag-reset:hover { color: var(--text); border-color: var(--text-muted); background: var(--input-bg); }

  @media (max-width: 360px) { .container { padding: 10px; } .card { padding: 16px; } .stage-btn { padding: 6px 2px; font-size: 11px; } }
</style>
</head>

<script>
const TOMATO_BED_AREA = 54.7;
const TOMATO_NUMBER_BEDS = 7;
const LETTUCE_BED_AREA = 30.4;
const LETTUCE_NUMBER_BEDS = 4.5;

// computeStageRecipe(stage) is declared LATER in this file, after all its
// dependencies (TOMATO_FRUIT_EXPORT, BIOMASS_DEMAND, STORED_RECIPE,
// PRODUCT_PCT, SIDEDRESS_MINIMUM_EFFICIENCY, SIDEDRESS_AREA_PER_PLANCHE). It returns the
// FP-target fertigation per stage (mass-balance from RECIPE_INPUTS), used by
// the Block 7 stored-vs-FP drift gauge. The team-facing fertigation values are
// the locked STORED_RECIPE.tomato.fertigation — what gets weighed at the
// goutteur each week.

// FERTIGATION OLIGOS REMOVED (April 26, 2026)
// Reasoning: At soil pH 7.4 (calcium-saturated), most sulfate-form oligos
// precipitate before reaching plants:
//   - FeSO4: Fe2+ oxidizes to Fe3+ and forms iron hydroxide/phosphate precipitates
//   - MnSO4: oxidizes to MnO2 (unavailable form)
//   - ZnSO4: forms zinc hydroxide and phosphate precipitates
//   - CuSO4: partial availability, but mostly bound by soil
// Boron (borax) and molybdenum (Na molybdate) DO work at high pH, but kept out
// for workflow simplification — Option C from the cost-benefit analysis.
// Foliar program bypasses soil chemistry entirely. Current state (2026-05-06):
//   - Tomato Spray (single weekly): Mn, Zn, B, Cu, Mo, Fe (FeSO₄·7H₂O 80 g)
//   - Tomato Spray B (CaCl₂ anti-BER): REMOVED — Teris industrial grade
//     Ecocert listing was unverified; BER prevention now via ventilation +
//     humidity management.
//   - Lettuce foliar: REMOVED — Fe moved to nursery fertigation + production
//     fertigation (more efficient than foliar bypass on locked-out beds).
// References on foliar at high pH:
//   - Mosaic Crop Nutrition: foliar recommended for Fe at any pH
//   - Pioneer Seeds agronomy: foliar for elements not efficiently used in soil
//   - Iranian olive research on calcareous soils: foliar > soil for alkaline
// Reintroduce sulfate oligos in fertigation when soil pH drops below 6.5.
// Reference rates per 100 m² (1× multiplier, before MgSO4 multiplier):
// const TOMATO_MICROS = { feSulfate: 20, znSulfate: 4, mnSulfate: 7, cuSulfate: 1, borax: 9, moSodium: 1 };
// LETTUCE production fertigation (per 100 m² per week, dissolved in stock barrel).
// feSulfate 7.5 g/100 m² added 2026-04-29 as supplement for stretched cycles

//   Same week 2025: 11,391 J/cm²/week = 1,627/day
const SOLAR_BY_MONTH = [
  600,   // Jan
  900,   // Feb
  1300,  // Mar
  1700,  // Apr
  2000,  // May
  2200,  // Jun
  2200,  // Jul

// Returns daily J/cm² for the current week. Prefers the 20-year weekly array
// (weeks 1-18 today), falls back to monthly average otherwise.
function getSolarRad() {
  const wk = getWeekNumber();
  const wkly = SOLAR_BY_WEEK[wk];
  if (wkly != null) return wkly / 7;
  const month = new Date().getMonth();
  return SOLAR_BY_MONTH[month];
}

// Auto-calculate current week number (ISO: week 1 contains Jan 4)
// and map to tomato growth stage
// Transplanted mid-December = week 51
// T1: weeks 51-2 (4 weeks), T2: 3-6, T3: 7-9, T4: 10-18, T5: 19+ (pleine production jusqu'à crop-out ~sem 28)
function getWeekNumber() {
  // ISO 8601 week number. Algorithm: jump to the Thursday of the current
  // ISO week, then count weeks since Jan 1 of that Thursday's year.
  // Why this shape: ISO weeks start Monday and the year-rollover week
  // (e.g. Dec 29 2025) belongs to week 1 of the *next* year. Using the
  // Thursday pivot handles both rules in one step.
  // Why not the previous formula: it added jan4.getDay() with Sun=0,
  // which silently shifted the result by one week whenever Jan 4 fell
  // on a Sunday (e.g. 2026 → returned 17 on Sat May 2 instead of 18).
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  const dayNumber = d.getDay() || 7; // Sun=0 → treat as 7 so Mon..Sun maps to 1..7
  d.setDate(d.getDate() + 4 - dayNumber); // pivot to Thursday of current ISO week
  const yearStart = new Date(d.getFullYear(), 0, 1);
  return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
}

function getStageFromWeek(week) {
  if (week >= 51 || week <= 2) return 'T1';
  if (week <= 6) return 'T2';
  if (week <= 9) return 'T3';
  if (week <= 18) return 'T4';
  return 'T5'; // T5: weeks 19+ (runs to crop-out — variable end, no fixed week)
}

function autoStage() {
  if (currentCrop !== 'tomato') return;
  const week = getWeekNumber();
  currentStage = getStageFromWeek(week);
  document.querySelectorAll('[data-stage]').forEach(b => b.classList.toggle('active', b.dataset.stage === currentStage));
  document.getElementById('stage-auto-label').innerHTML =
    `Semaine <strong style="color:var(--text);">${week}</strong> → stade <strong style="color:var(--text);">${currentStage}</strong> (automatique)`;

  // Show radiation
  document.getElementById('param-radiation').textContent = getSolarRad() + ' J/cm²/jour';
}

// Nursery
// Fish dose: 13 mL/L (April 26, 2026 — bumped from 10 mL/L to push tray-finishing
// strategy). Reasoning: 10 mL/L delivers ~200 ppm N pulse but effective continuous
// N is much lower due to leaching → undersized for finished lettuce in trays.
// Target N production range is 150-200 ppm continuous; 13 mL/L moves us closer
// without crossing into salt-burn risk zone.
//
// EC MEASUREMENT STRATEGY (using Bluelab pen):
//   - Solution EC (in bucket): target 1.9-2.6 mS/cm. Verification step to catch
//     mixing errors. Keep this check while validating the 13 mL/L recipe over
//     a few cycles, then can be dropped once consistent.
//   - Substrate EC (in cell, 30-60 min after watering): target 1.5-2.5 mS/cm.
//     This is what plants actually experience. Should be slightly lower than
//     solution EC due to plant uptake and dilution in substrate.
//   - With top-watering (current practice), salts accumulate at cell BOTTOM
//     over time. Substrate EC trending up cycle-after-cycle = needs flush.
//   - Probe insertion: into wet (not saturated) substrate, push firmly,
//     wait 30-60s for stable reading. Average 2-3 cells per tray.
//
// Kelp stays at 2 mL/L — biostimulant, not primary nutrient source.
// Water: 1.25 L/tray = ~25 mL/cell for 50-cell trays.
//
// FeSO₄·7H₂O 15 mg/L = ~3 ppm Fe in fertigation solution (added 2026-04-29):
// Source: Alpha Chemicals (Amazon B007ODUI76), 20% Fe by mass. Organic-allowed
// per CAN/CGSB-32.311 (ferrous sulphate is on the permitted iron sources list).
//   Reason for adding here vs production foliar:
//   - Nursery substrate is acidic (peat-based, pH ~5.5-6.0) — Fe²⁺ stays
//     bioavailable to roots. Production beds at pH 7.4 lock out Fe immediately.
//   - Root uptake at acidic pH is 60-80% efficient vs ~10-15% for foliar
//     cuticle absorption. Same gram of Fe delivers 4-8× more usable Fe via
//     nursery fertigation than via production foliar spray.
//   - Loads seedlings with tissue Fe before transplant — plants enter
//     production with reserves, coast through 2-week lettuce cycle even with
//     locked-out beds.
//   - Eliminates lettuce production foliar spray entirely (no PHI, no residue
//     wash, no Cu cumulative concern, less labor).
//   Target: 3 ppm Fe in solution (standard hydroponic Fe range).
//   FeSO₄·7H₂O at 20% Fe → 3 / 0.20 = 15 mg product per L water.
//   For 75 trays × 1.25 L = 93.75 L → 1406 mg = 1.41 g of FeSO₄·7H₂O.
//   Stability: dissolved FeSO₄ oxidizes Fe²⁺ → Fe³⁺ over hours and precipitates
//   if pH drifts above ~5.5. Mix and apply same day; the team's water has low
//   alkalinity (Berger 39086, 25 ppm CaCO₃) and the FeSO₄ self-acidifies the
//   bucket to pH ~5, so no separate acid step needed.
//   EC contribution at 15 mg/L is negligible (~0.015 mS/cm) — EC targets unchanged.
function recalcNursery() {
  const element = document.getElementById('tray-count');
  if (!element) return;
  const trays = parseInt(element.value) || 1;
  const water = trays * 1.25;
  document.getElementById('out-water').textContent = water % 1 === 0 ? water : water.toFixed(1);
  document.getElementById('out-fish').textContent = Math.round(water * 13);
  document.getElementById('out-kelp').textContent = Math.round(water * 2);
  // FeSO₄·7H₂O dose: 15 mg/L → display in g (typical batch is 1-2 g)
  const feG = (water * 15) / 1000;
  document.getElementById('out-fe').textContent = feG.toFixed(2);
}

// Soil weekly contribution — direct mass-flow model from SME data.
//
// SME (Saturated Media Extract, Berger sample 596614, tomato bed, 2026-04-10)
// reports the actual ion concentrations the plant root sees in the soil paste.
// Multiplying by weekly transpiration gives mass-flow uptake — the dominant
// nutrient delivery mechanism for ions already in solution.
//
// This replaces the earlier Mehlich-3 × annual-fraction approximation, which
// was conservative for B/Cu/Mo (treated them as 0) and overstated K demand
// gaps. SME is more honest because it captures BOTH the reservoir effect AND
// the chemistry that limits availability (lockout already shows up as low SME).
//
// Source: farm info/SME - 2026-04-10.pdf
const SME_TOMATO_PPM = {
  N:  45.4,    // NO₃ 45.0 + NH₄ 0.4 (in spec range 35-180 / 0-20)
  P:   1.1,    // ↓ below norm 5-50 (lockout confirmed)
  K:  292.3,   // in spec, near top
  Ca: 238.8,   // ↑ above norm 40-200 (Ca-saturated, root cause of crisis)
  Mg:  79.3,   // in spec
  B:    0.18,  // in spec 0.05-0.5 — neutral boric acid, not pH-locked
  Cu:   0.04,  // in spec 0.01-0.5
  Fe:   0.86,  // in spec 0.30-3 (BUT calcareous lockout suppresses real uptake; see discount)
  Mn:   0,     // < 0.03 below detection — locked
  Mo:   0.02,  // in spec 0.01-0.05 — anion, MORE available at high pH
  Zn:   0,     // < 0.03 below detection — locked
};

// Weekly water flow through the root zone, per m².
// SAME FORMULA as the fertigation page's irrigation calculation (see line ~280
// HTML comment + getStockVol()): 2 mL/(J/cm²)/m² × solar radiation × 7 days.
// Mass-flow uptake = this volume × SME concentration to a reasonable
// approximation (drip system, minor leaching loss, mature canopy where
// transpiration ≈ irrigation). Cert 3 — uncertainty in the 2 mL/J coefficient
// is within ±20%.
//
// Why this matters: soil supply scales with the season. In May (~2000 J/cm²/day)
// the flow is ~28 L/m²/wk; in December (~500 J/cm²/day) it drops to ~7 L/m²/wk.
// The Bilan now correctly shows B/Mo/Cu coverage tightening in winter even
// though the SME concentrations are unchanged.
function weeklyMassFlowL() {
  return (2 * getSolarRad() * 7) / 1000;
}

// Transpiration factor — corrects mass-flow for canopy size. Cert 3.
//
// `weeklyMassFlowL()` returns IRRIGATION volume (the formula is fertigation-
// driven). For a mature, healthy plant with full canopy, transpiration ≈ irrigation
// minus a small leaching fraction. But for a stunted plant at, say, 30% target
// yield, the canopy is much smaller and real transpiration is materially less —
// often 50-70% of irrigation. Most of the surplus water leaches past the roots
// without contributing to mass-flow uptake.
//
// Without this correction, the Bilan would systematically overstate soil supply
// for stunted plants — exactly the failure mode that perpetuates stunting (the
// model says "you have plenty of N from soil", user under-fertigates, plants
// stay stunted, model still says "you have plenty"...).
//
// Approximation: transpiration scales roughly with canopy area, which scales
// roughly with yield achievement at production stages. Floor at 0.4 because
// even tiny seedlings transpire some. Cap at 1.0 (can't exceed irrigation).
//
// More precise alternatives we're NOT using yet (cost > value at current state):
//   - Direct LAI measurement (would need leaf-area meter)
//   - Penman-Monteith from VPD + canopy resistance (overengineered for our context)
//   - Drainage-fraction monitoring on a sample bed (good idea, separate operational
//     decision — see issue R3 in the audit notes)
function transpirationFactor(currentKgM2Wk, targetKgM2Wk) {
  if (!targetKgM2Wk || targetKgM2Wk <= 0) return 1.0;
  const ratio = currentKgM2Wk / targetKgM2Wk;
  return Math.max(0.4, Math.min(1.0, ratio));
}

// Seasonal mineralization multiplier for organic N specifically. Cert 3.
//
// The SME N reading (April 2026) is a snapshot. But soil microbial N
// mineralization rate roughly doubles for every 10°C rise (Q10 ≈ 2,
// Stanford & Smith 1972). Greenhouse soil temperature swings ~12-22°C
// across the year (warmer than outside but not isothermal). Without
// scaling, we'd assume April-rate mineralization continues all summer
// (understating supply when demand is highest) and all winter
// (overstating when soil cools and microbes slow).
//
// Calibration: April = 1.0 baseline (the test month). Other months scale
// relative to it based on greenhouse soil temperature curves and Q10.
// Range 0.6 (deep winter) to 2.0 (peak summer).
//
// This applies ONLY to the N branch in soilWeeklyAvailable. Other elements
// (P, K, Ca, Mg, micros) are dissolved ions in SME — their availability
// scales with transpiration (already in weeklyMassFlowL), not with
// microbial activity.
const N_MINERALIZATION_BY_MONTH = [
  0.6,   // Jan — soil cold, microbes slow
  0.6,   // Feb
  0.8,   // Mar
  1.0,   // Apr — SME baseline (test month)
  1.3,   // May
  1.7,   // Jun
  2.0,   // Jul — peak microbial activity
  2.0,   // Aug
  1.5,   // Sep
  1.1,   // Oct
  0.8,   // Nov
  0.6,   // Dec
];

function nMineralizationFactor() {
  return N_MINERALIZATION_BY_MONTH[new Date().getMonth()];
}

// Bioavailability efficiency from SME concentration to actual root uptake.
// For ions where mass-flow is the dominant uptake mechanism (most macros + B,
// Cu, Mo at this pH), efficiency is ~100%. For Fe specifically, even when
// in solution at SME concentration, calcareous-rhizosphere chemistry suppresses
// root reductase activity and real uptake is much lower than mass-flow predicts.
// Cert 3-4. Confirmed empirically: SME shows Fe in spec (0.86 ppm) but plants
// display Fe deficiency symptoms — so the discount is real.
//
// N also gets the seasonal mineralization multiplier (above) on top of the
// base 0.85 efficiency — soil microbial activity is rate-limiting for organic
// N supply, and that activity is strongly temperature-dependent.
function soilWeeklyAvailable(elem, phLocked, transpFactor) {
  const sme_ppm = SME_TOMATO_PPM[elem] || 0;
  const tf = transpFactor || 1.0;
  // `transpFactor` (0,4-1,0) corrects mass-flow for canopy size — see
  // transpirationFactor() comment. Applies to ALL elements because they all
  // arrive at roots via the same water flow.
  const massFlow_mg = sme_ppm * weeklyMassFlowL() * tf;
  let efficiency = 1.0;
  // Fe lockout — 0,15 = midpoint of the Cadre framework page's 10-20% bypass
  // efficiency at pH 7,4. Aligned 2026-05-05; previously 0,30 was too generous
  // and contradicted both the Cadre page narrative AND field observation
  // (visible Fe chlorosis on apex despite SME Fe in spec). Cert 4.
  if (elem === 'Fe' && phLocked) efficiency = 0.15;
  else if (elem === 'N')         efficiency = 0.85 * nMineralizationFactor();
  return massFlow_mg * efficiency;
}

// REQ-017 — pH-aware effective efficiency curves.
// Each function takes soilPh and returns a multiplier 0..1.
// Source: Cadre framework table (see nutrient-model-reference.md §3.4) +
// Marschner soil-chemistry curves. Cert 3-4.
const PH_RESPONSE = {
  // Cation exchange + soluble salt: K, Mg, Ca all flat across agronomic pH.
  // Tiny drop above 7.5 reflects competition with Ca-saturation. cert 4
  'soluble-cation': function(ph) {
    if (ph <= 7.0) return 1.0;
    if (ph >= 8.0) return 0.85;
    return 1.0 - 0.15 * (ph - 7.0);
  },
  // Sulfate-form transition metals (Fe, Mn, Zn, Cu): sigmoid drop.
  // 1.0 at pH 6.0; 0.50 at pH 7.0; 0.10 at pH 7.4; 0.05 at pH 7.8+. cert 4
  'sulfate-metal': function(ph) {
    if (ph <= 6.0) return 1.0;
    if (ph >= 7.8) return 0.05;
    // Logistic-shaped piecewise
    if (ph <= 7.0) return 1.0 - 0.50 * (ph - 6.0);
    if (ph <= 7.4) return 0.50 - 1.00 * (ph - 7.0);    // 0.50 → 0.10
    return 0.10 - 0.125 * (ph - 7.4);                   // 0.10 → 0.05
  },
  // EDTA: stable to pH ~6.5 then collapses. cert 4
  'chelate-edta': function(ph) {
    if (ph <= 6.5) return 1.0;
    if (ph >= 7.5) return 0.10;
    return 1.0 - 0.90 * (ph - 6.5);
  },
  // EDDHA: flat across full agronomic pH. cert 5
  'chelate-eddha': function(ph) {
    return (ph >= 4.0 && ph <= 9.0) ? 1.0 : 0.5;
  },
  // DTPA: stable to ~7.5. cert 4
  'chelate-dtpa': function(ph) {
    if (ph <= 7.5) return 1.0;
    if (ph >= 8.5) return 0.20;
    return 1.0 - 0.80 * (ph - 7.5);
  },
  // Organic N mineralization: temperature-dependent, pH less so but mild
  // suppression > 7.5 from Ca saturation slowing microbes. cert 3
  'organic-N': function(ph) {
    if (ph <= 7.5) return 1.0;
    if (ph >= 8.5) return 0.7;
    return 1.0 - 0.30 * (ph - 7.5);
  },
  // Organic P mineralization × Ca-P precipitation. cert 4 (matches Cadre 5-15%).
  'organic-P': function(ph) {
    if (ph <= 6.0) return 1.0;
    if (ph >= 7.4) return 0.10;
    return 1.0 - 0.643 * (ph - 6.0);
  },
  // Borate: flat, slight rise in availability with pH up to 8 (boric acid → B(OH)4⁻). cert 3
  'borate': function(ph) {
    return 1.0;
  },
  // Molybdate: prefers alkaline (anion). cert 4
  'molybdate': function(ph) {
    if (ph <= 5.5) return 0.30;
    if (ph >= 7.0) return 1.0;
    return 0.30 + 0.467 * (ph - 5.5);
  },
  // Foliar bypass — soil pH irrelevant (different curve = foliarPhResponse for spray pH). cert 5
  'foliar-bypass': function(ph) {
    return 1.0;
  },
};

// REQ-055 — Foliar uptake pH multiplier (cuticle absorption window).
// Curve from REQ-055 table; linear interpolation between anchors. cert 3.
function foliarPhResponse(ph) {
  if (ph <= 4.0) return 0.5;
  if (ph <= 4.5) return 0.5 + (0.7 - 0.5) * (ph - 4.0) / 0.5;
  if (ph <= 5.0) return 0.7 + (0.9 - 0.7) * (ph - 4.5) / 0.5;
  if (ph <= 5.5) return 0.9 + (1.0 - 0.9) * (ph - 5.0) / 0.5;
  if (ph <= 6.0) return 1.0;
  if (ph <= 6.5) return 1.0 + (0.95 - 1.0) * (ph - 6.0) / 0.5;
  if (ph <= 7.0) return 0.95 + (0.85 - 0.95) * (ph - 6.5) / 0.5;
  if (ph <= 7.5) return 0.85 + (0.70 - 0.85) * (ph - 7.0) / 0.5;
  if (ph <= 8.0) return 0.70 + (0.50 - 0.70) * (ph - 7.5) / 0.5;
  return 0.5;
}

//
// Routing rule (REQ-018):

//     Soil pH gates rhizosphere availability via Ksp / chelate stability.
//   - Foliar channel: SKIP soil-pH penalty entirely. Cuticle uptake is

//   - Verifier note: REQ-018 should pass sprayPh (or rely on the foliar
//     branch below) when checking foliar products. Calling
//     effectiveEfficiency('MnSO4','Mn', soilPh) without a foliar context would
//     STILL bypass soil-pH for foliar products by design here.
function effectiveEfficiency(productName, element, soilPh, sprayPh) {
  if (sprayPh === undefined) sprayPh = null;
  const p = PRODUCT[productName];
  if (!p || !p.base || !p.base[element]) return 0;
  const cls = (typeof p.phClass === 'string') ? p.phClass : (p.phClass || {})[element];
  const base = 1.0;                                  // efficiency, not mass fraction (mass fraction handled by p.base[element])
  let phMod = 1.0;
  let fieldMod = 1.0;
  if (p.ch === 'foliar') {
    // Foliar: soil pH irrelevant by definition (cuticle uptake bypasses
    // rhizosphere). Use foliarPhResponse(tankPh) + coverage factor only.
    fieldMod *= foliarPhResponse(sprayPh != null ? sprayPh : 5.5);
    fieldMod *= 0.30;                                // coverage factor — fixed 0.30 (no yucca per 2026-05-05 decision)
  } else {
    // Soil/fertigation: apply rhizosphere pH curve.
    if (cls && PH_RESPONSE[cls]) phMod = PH_RESPONSE[cls](soilPh);
  }
  return base * phMod * fieldMod;
}

// REQ-024 — Predicted irrigation CE at the dripper.
// recipe = { productName: gPerL_in_tank }; dilution = Dosatron ratio (e.g. 0.02).
// Returns mS/cm at 20°C reference.
function predictedCE(recipe, dilution, waterCE) {
  if (dilution === undefined) dilution = 1.0;
  if (waterCE === undefined) waterCE = 0.10;
  let CE = waterCE;
  for (const name in recipe) {
    if (!Object.prototype.hasOwnProperty.call(recipe, name)) continue;
    const p = PRODUCT[name];
    if (!p) continue;
    const gPerL = recipe[name];
    CE += (p.ecFactor || 0) * gPerL * dilution;
  }
  return CE;
}

// REQ-053 — Predicted tank pH (linear sum of phContributions × g/L).
// Rough first-pass; assumes no buffering. cert 2-3.
function predictedTankPh(recipe, waterPh) {
  if (waterPh === undefined) waterPh = 7.0;
  let pH = waterPh;
  for (const name in recipe) {
    if (!Object.prototype.hasOwnProperty.call(recipe, name)) continue;
    const p = PRODUCT[name];
    if (!p) continue;
    pH += (p.phContribution || 0) * recipe[name];
  }
  return Math.max(2.0, Math.min(12.0, pH));
}

// REQ-020 — Passive supply mass-flow (SME ppm × transpiration L/m²/wk).
// Apply LOCKOUT_GATE for P/Mn/Zn at pH > 6.8: cap at 100 mg/m²/wk for P,
// at SME-derived value (which is ~0 for Mn/Zn anyway). cert 4.
function passiveSupplyMassFlow(crop, element, week) {
  const sme = (crop === 'tomato') ? SME_TOMATO_PPM : SME_LETTUCE_PPM;
  const ppm = (sme && sme[element]) || 0;
  const flowL = weeklyMassFlowL();
  let mass = ppm * flowL;                            // mg/m²/wk
  // Lockout gate: when pH > 6.8, P passive supply capped at 100 mg/m²/wk
  // even if Mehlich-3 bank suggests more. Mn/Zn already ~0 in SME so cap is moot.
  // Source: REQ-020 + audit Finding 7 (pH 7.4 effectively gates Ca-P precip).
  const phLocked = true;                              // Phase 1 assumption — wired to checkbox in next phase
  if (phLocked && (element === 'P' || element === 'Mn' || element === 'Zn')) {
    mass = Math.min(mass, 100);
  }
  return mass;
}

// Compute the recipe a channel SHOULD use, from first principles.
// For each element where CHANNEL_ROLE assigns this channel a fraction:
//   target_mass = (demand[stage,element] − passive[element]) × CHANNEL_ROLE[element][channel]
//   product_mass = target_mass / (efficiency × analysis)
// Output: { productName: gramsPerWeekPerArea }
//
// Phase 1 scope: tomato only. computeRecipe('lettuce', ...) → null until
// LETTUCE_BIOMASS_DEMAND lands (audit Finding 5).
// TODO: lettuce demand model
function computeRecipe(crop, stage, channel) {
  if (crop !== 'tomato') return null;
  const bio = BIOMASS_DEMAND[stage] || {};
  const fruitYield = 1.5;                             // target kg/m²/wk; Phase 1 fixed
  const demand = {};
  Object.keys(TOMATO_FRUIT_EXPORT).forEach(function(element) {
    demand[element] = (TOMATO_FRUIT_EXPORT[element].g * fruitYield * 1000) + (bio[element] || 0);
  });
  const soilPh = 7.4;                                 // Phase 1 assumption
  const sprayPh = 5.0;                                // typical sulfate-heavy Spray A
  const out = {};

  // Pick representative product per channel × element
  // Mapping (cert 3-4 — editorial choice based on the existing recipe):
  //   fertigation  K → K2SO4
  //   fertigation  Mg → MgSO4-7H2O
  //   sidedress    N → split between Actisol-5-3-2 and FarinePlumes (~40/60 by N mass)
  //   sidedress    P → Actisol-5-3-2
  //   sidedress    K → Actisol-5-3-2
  //   foliar       Mn → MnSO4
  //   foliar       Zn → ZnSO4
  //   foliar       Cu → CuSO4
  //   foliar       B → Solubore
  //   foliar       Mo → NaMolybdate
  //   foliar       Fe → FeSO4-7H2O (bridge while Iron DL pending)
  //   foliar       Ca → CaCl2-2H2O (concentration mode — not flux-computed)
  const mapping = {
    fertigation: { K: ['K2SO4'], Mg: ['MgSO4-7H2O'] },
    sidedress: {
      N: ['Actisol-5-3-2', 'FarinePlumes'],
      P: ['Actisol-5-3-2'],
      K: ['Actisol-5-3-2'],
    },
    foliar: {
      Mn: ['MnSO4'], Zn: ['ZnSO4'], Cu: ['CuSO4'],
      B:  ['Solubore'], Mo: ['NaMolybdate'], Fe: ['FeSO4-7H2O'],
    },
  };
  const channelMap = mapping[channel] || {};
  const area = TOMATO_NUMBER_BEDS * TOMATO_BED_AREA;     // 382.9 m²

  Object.keys(channelMap).forEach(function(element) {
    const role = (CHANNEL_ROLE[element] || {})[channel] || 0;
    if (role <= 0) return;
    // Subtract passive supply for elements where passive is in CHANNEL_ROLE
    const passiveRole = (CHANNEL_ROLE[element] || {}).passive || 0;
    const passive_mg_m2 = passiveRole > 0 ? passiveSupplyMassFlow('tomato', element) * passiveRole : 0;
    const need_mg_m2 = Math.max(0, demand[element] - passive_mg_m2) * role;
    if (need_mg_m2 <= 0) return;
    const products = channelMap[element];
    // Split evenly across the listed products by mass fraction
    products.forEach(function(productName) {
      const p = PRODUCT[productName];
      if (!p) return;
      const analysis = p.base[element] || 0;
      if (analysis <= 0) return;
      // Sidedress: factor in mineralization efficiency (SIDEDRESS_MINIMUM_EFFICIENCY)
      // Foliar: foliarPhResponse + 30% coverage already in effectiveEfficiency
      // Fertigation: pH response on phClass
      let efficiency;
      if (channel === 'sidedress') {
        const minimumEfficiencyKey = (productName === 'Actisol-5-3-2')
          ? (element === 'N' ? 'Actisol_N' : element === 'P' ? 'Actisol_P' : 'Actisol_K')
          : 'FarinePlumes_N';
        efficiency = (SIDEDRESS_MINIMUM_EFFICIENCY[minimumEfficiencyKey] || 0.5);     // mineralization efficiency; pH lockout for P captured separately
        if (channel === 'sidedress' && element === 'P') {
          // REQ-018: at pH 7.4 P is decorative — multiply by Cadre 0.10
          efficiency *= PH_RESPONSE['organic-P'](7.4);
        }
      } else if (channel === 'foliar') {
        efficiency = effectiveEfficiency(productName, element, soilPh, sprayPh);
        // effectiveEfficiency returns 0..1 already including coverage; that's the multiplier
        // applied to mass arriving at leaf. Divide need by it to get applied mass.
        if (efficiency <= 0) efficiency = 0.30;                     // floor — don't divide by 0
      } else if (channel === 'fertigation') {
        const cls = (typeof p.phClass === 'string') ? p.phClass : (p.phClass || {})[element];
        efficiency = cls && PH_RESPONSE[cls] ? PH_RESPONSE[cls](soilPh) : 1.0;
      } else {
        efficiency = 1.0;
      }
      // mass per m²/wk → grams across whole tomato area / share
      const share = 1.0 / products.length;
      const mass_mg_m2_wk = (need_mg_m2 * share) / Math.max(efficiency, 0.001) / analysis;
      // Convert to per-area total: for fertigation/foliar that's grams over the
      // whole tomato area; for sidedress it's grams per planche.
      let g_total;
      if (channel === 'sidedress') {
        g_total = mass_mg_m2_wk * SIDEDRESS_AREA_PER_PLANCHE / 1000;  // g/planche/wk
      } else {
        g_total = mass_mg_m2_wk * area / 1000;        // g/wk over tomato area
      }
      out[productName] = (out[productName] || 0) + g_total;
    });
  });
  return out;
}

// ─── Coverage / sanity checks for REQ-029a/b/c ───
// These run at script load time and console.warn if any product in PRODUCT
// has missing ions/tags, or any ion pair / tag is unclassified.
(function validatePhase1ModelCoverage() {
  try {
    const cations = new Set();
    const anions = new Set();
    const tags = new Set();
    const cationList = ['K+', 'Mg2+', 'Fe2+', 'Mn2+', 'Zn2+', 'Cu2+', 'Ca2+', 'Na+', 'NH4+', 'H+'];
    const anionList = ['SO4-2', 'Cl-', 'B(OH)4-', 'MoO4-2', 'organic-matrix', 'PO4-3', 'OH-', 'NO3-'];
    Object.keys(PRODUCT).forEach(function(name) {
      const p = PRODUCT[name];
      if (!p.ions || Object.keys(p.ions).length === 0) console.warn('[Phase1] missing ions:', name);
      if (!p.chemistryTags || p.chemistryTags.length === 0) console.warn('[Phase1] missing tags:', name);
      Object.keys(p.ions || {}).forEach(function(ion) {
        if (cationList.indexOf(ion) >= 0) cations.add(ion);
        else if (anionList.indexOf(ion) >= 0) anions.add(ion);
      });
      (p.chemistryTags || []).forEach(function(t) { tags.add(t); });
    });
    // REQ-029b: every cation × anion pair from declared ions must appear in KSP_PAIRS or KSP_SAFE
    const safeKey = function(c, a) { return c + '|' + a; };
    const safeSet = new Set();
    KSP_SAFE.forEach(function(s) { safeSet.add(safeKey(s.cation, s.anion)); });
    KSP_PAIRS.forEach(function(s) { safeSet.add(safeKey(s.cation, s.anion)); });
    cations.forEach(function(c) {
      anions.forEach(function(a) {
        if (!safeSet.has(safeKey(c, a))) console.warn('[Phase1] unclassified pair:', c, '×', a);
      });
    });
    // REQ-029c: every tag must appear in TAG_INCOMPATIBILITIES or TAGS_INERT
    const tagsInIncomp = new Set();
    TAG_INCOMPATIBILITIES.forEach(function(r) { (r.tags || []).forEach(function(t) { tagsInIncomp.add(t); }); });
    tags.forEach(function(t) {
      if (!tagsInIncomp.has(t) && !TAGS_INERT[t]) console.warn('[Phase1] unclassified tag:', t);
    });
  } catch (e) { console.warn('[Phase1] coverage check failed:', e); }
})();

// Stored recipe vs first-principles target (Block 7 — admin diagnostic).
// Pulls stored doses from STORED_RECIPE.tomato.{fertigation, sidedress, foliaire}
// (live operational state — what the team weighs) and FP target from
// FP_RECIPE_T5 + computeStageRecipe (mass-balance derivation). Color-codes
// 5% / 30% / >30%. T5 only — other stages render a placeholder pointing at
// Recette proposée. The drift is genuine: STORED_RECIPE.tomato.fertigation is
// hand-stored at its current weighed values (Haifa-heritage at kSulfate /
// mgSulfate; PA Taillon recommendation anchors the FP target, not STORED),
// while computeStageRecipe is derived from RECIPE_INPUTS via mass-balance.
function renderPhase1Comparison() {
  const stage = nutrStage;
  // Stored recipes summarized as { productName: gramsPerWeekTotal }
  const storedFert = STORED_RECIPE.tomato.fertigation[stage] || { mgSulfate: 0, kSulfate: 0 };
  const fertStored = {
    'K2SO4':       storedFert.kSulfate * getMultK(),
    'MgSO4-7H2O':  storedFert.mgSulfate * getMultMg(),
  };
  const sd = STORED_RECIPE.tomato.sidedress[stage];
  // Side-dress is g/planche/wk (NOT total area)
  const sidedressStored = {
    'Actisol-5-3-2': sd.actisol_g,
    'FarinePlumes':  sd.farine_g,
  };
  // Foliar parsed from STORED_RECIPE.tomato.foliaire.A label strings (g per 15 L master tank)
  const A = STORED_RECIPE.tomato.foliaire.A;
  const parseG = function(s) { return parseFloat(String(s).replace(',', '.')) || 0; };
  const find = function(sub) { return A.find(function(x) { return x.name.indexOf(sub) >= 0; }); };
  const foliarStored = {
    'MnSO4':        parseG((find('MnSO₄') || {}).master),
    'ZnSO4':        parseG((find('ZnSO₄') || {}).master),
    'CuSO4':        parseG((find('CuSO₄') || {}).master),
    'Solubore':     parseG((find('Solubore') || {}).master),
    'NaMolybdate':  parseG((find('Molybdate') || {}).master),
    'FeSO4-7H2O':   parseG((find('FeSO₄') || {}).master),
  };

  // stable — framing copy (intro + tier thresholds + table headers) is invariant
  // domain context. Numbers below come from constants (FP_RECIPE_T5 + stored).
  let html = '<div style="font-size:12px; color:var(--text-muted); line-height:1.5; margin-bottom:8px;">'
    + 'Recette stockée actuelle (ce que l\'équipe pèse cette semaine) vs cible premiers principes (Recette proposée — sidedress reframe + plafond demande + contraintes sans yucca). '
    + '<strong>Vert</strong> ≤5 % · <strong>jaune</strong> ≤30 % · <strong>rouge</strong> &gt;30 %. Stade <strong>' + stage + '</strong>.'
    + '</div>';

  // FP recipe is only derived for T5. Other stages get a placeholder.
  if (stage !== 'T5') {
    html += '<div style="padding:10px 12px; background:var(--input-bg); border-radius:var(--radius-sm); font-size:11.5px; color:var(--text-muted); line-height:1.5;">'
      + 'FP non dérivé pour ce stade — voir <strong style="color:var(--text);">Recette proposée</strong> pour T5.'
      + '</div>';
    return html;
  }

  // FP fertigation: prefer FP_RECIPE_T5 override when set; otherwise fall back
  // to computeStageRecipe(stage) (mass-balance derivation from RECIPE_INPUTS).
  // Mirrors the precedence in calculateNutritionSupply's FP branch.
  const fpStage = computeStageRecipe(stage) || { mgSulfate: 0, kSulfate: 0 };
  const fertFp      = {
    'K2SO4':      (FP_RECIPE_T5.fertigation['K2SO4']      != null) ? FP_RECIPE_T5.fertigation['K2SO4']      : fpStage.kSulfate,
    'MgSO4-7H2O': (FP_RECIPE_T5.fertigation['MgSO4-7H2O'] != null) ? FP_RECIPE_T5.fertigation['MgSO4-7H2O'] : fpStage.mgSulfate,
  };
  const sidedressFp = FP_RECIPE_T5.sidedress;
  const foliarFp    = FP_RECIPE_T5.foliar;

  const colorOf = function(stored, fp) {
    if (stored === 0 && fp === 0) return '#9aa3ad';
    if (stored === 0) return '#b03030';
    const ratio = fp / stored;
    const dev = Math.abs(ratio - 1.0);
    if (dev <= 0.05) return '#1e6b2d';
    if (dev <= 0.30) return '#a08020';
    return '#b03030';
  };
  const fmtG = function(g) {
    if (g === 0) return '0 g';
    if (g >= 100) return Math.round(g) + ' g';
    if (g >= 1)   return g.toFixed(1) + ' g';
    return g.toFixed(2) + ' g';
  };
  const row = function(name, stored, fp, unit) {
    let ratioStr;
    if (stored === 0 && fp === 0) ratioStr = '—';
    else if (stored === 0)        ratioStr = '∞';
    else if (fp === 0)            ratioStr = '0 %';
    else                          ratioStr = (fp / stored * 100).toFixed(0) + ' %';
    return '<tr style="border-bottom:1px solid var(--border);">'
      + '<td style="padding:4px 8px; font-weight:600;">' + name + '</td>'
      + '<td style="padding:4px 8px; font-family:\'DM Mono\',monospace; text-align:right;">' + fmtG(stored) + ' ' + unit + '</td>'
      + '<td style="padding:4px 8px; font-family:\'DM Mono\',monospace; text-align:right;">' + fmtG(fp) + ' ' + unit + '</td>'
      + '<td style="padding:4px 8px; font-family:\'DM Mono\',monospace; text-align:right; color:' + colorOf(stored, fp) + '; font-weight:600;">' + ratioStr + '</td>'
      + '</tr>';
  };
  const section = function(title, stored, fp, unit) {
    let h = '<div style="margin-top:14px; font-weight:700; font-size:12.5px;">' + title + '</div>'
      + '<table style="width:100%; border-collapse:collapse; font-size:12px; margin-top:4px;">'
      + '<thead><tr style="text-align:left; color:var(--text-muted); font-size:10px; text-transform:uppercase; letter-spacing:1px;">'
      + '<th style="padding:4px 8px;">Produit</th>'
      + '<th style="padding:4px 8px; text-align:right;">Stocké</th>'
      + '<th style="padding:4px 8px; text-align:right;">FP</th>'
      + '<th style="padding:4px 8px; text-align:right;">Ratio</th>'
      + '</tr></thead><tbody>';
    const all = new Set(Object.keys(stored).concat(Object.keys(fp)));
    all.forEach(function(name) {
      h += row(name, stored[name] || 0, fp[name] || 0, unit);
    });
    h += '</tbody></table>';
    return h;
  };

  html += section('Fertigation (g/sem · ' + (TOMATO_NUMBER_BEDS * TOMATO_BED_AREA).toFixed(0) + ' m²)', fertStored, fertFp, '');
  html += section('Engrais sol granulaire (g/planche/sem · 54,7 m²)', sidedressStored, sidedressFp, '');
  html += section('Foliaire (g par 15 L master)', foliarStored, foliarFp, '');
  return html;
}

// SUPPLY MODEL (revised 2026-05-10):
//   supply.soil   = SME × transpiration  (single source of "this week's soil access")
//   supply.fert   = barrel-loaded mass per m²/sem  (full delivery, no mixing-factor discount)
//   supply.foliar = (existing model)     (independent of soil chemistry)
//   supply.sidedress is computed but NOT in the supply sum. It feeds the
//   Block 3 bank-maintenance view: comparing weekly sidedress addition
//   to weekly plant drawdown from soil determines whether SME trends
//   up, holds, or depletes. Past sidedress contribution is already
//   captured in the SME measurement; double-counting was the bug fixed
//   here. See working files/coherence-audit.md Finding 14.
//
// Mixing factor retired 2026-05-10: prior to this date, stored-mode
// fertigation was multiplied by 0.5 (REQ-100, "rest joins SME pool"
// double-count framing). Concept dropped — fertigation is reported at
// full barrel mass; SME is a separate channel.

// LUXURY_FACTOR — cap on supply.soil per element, applied as
//   supply.soil[element] = min(SME[element] × transpiration, demand[element] × LUXURY_FACTOR[element])
// Mechanism: HAK/HKT transporter saturation + demand-driven feedback.
// Real uptake at saturating SME ≈ demand × small luxury fraction (vacuolar storage).
// Excess in solution stays on CEC, leaches, or remains in solution.
// References: Barber 1995, Marschner's Mineral Nutrition.
// Cert 3 mechanism. Cert 2-3 specific factor values.
//
// Effect today (April 2026 SME):
//   - K SME 292 ppm × ~28 L/m²/wk × tf ≈ 6 800-7 500 mg/m²/wk mass-flow potential,
//     but T5 demand × 1.15 ≈ 6 037 → cap binds → real uptake ≈ 6 037.
//   - Mg SME 79 ppm: similar story, cap binds.
//   - P SME 1.1 ppm: mass-flow ≈ 25-30 mg/m²/wk; demand × 1.0 ≈ 1 500 mg → cap doesn't bind.
//   - Fe/Mn/Zn at high pH: mass-flow already bottlenecks; cap inert.
const LUXURY_FACTOR = {
  N:  1.10,  // NO3 luxury uptake small; cert 3
  P:  1.00,  // closely demand-regulated; lockout usually binds first; cert 4
  K:  1.15,  // largest vacuolar K storage; cert 3
  Ca: 1.10,  // mass-flow + xylem; cert 3
  Mg: 1.10,  // similar to Ca; cert 3
  S:  1.00,  // closely demand-regulated; cert 3
  Fe: 1.00,  // micros: no significant luxury; cert 3
  Mn: 1.00,
  Zn: 1.00,
  B:  1.00,
  Cu: 1.00,
  Mo: 1.00,
};

function calculateNutritionSupply(stage, phLocked, transpFactor, targetYield, recipeMode) {
  const mode = recipeMode === 'fp' ? 'fp' : 'stored';
  const area = TOMATO_NUMBER_BEDS * TOMATO_BED_AREA; // 382.9 m²
  // Recipe source: stored = STORED_RECIPE.tomato.{fertigation,sidedress,foliaire}
  // (live operational state — what the team weighs). fp = FP_RECIPE_T5 +
  // computeStageRecipe (mass-balance target, T5 only — caller is responsible
  // for snapping nutrStage to T5 when mode='fp').
  // FP fertigation skips multipliers (FP is the absolute target, not user-tuned).
  const storedFert = STORED_RECIPE.tomato.fertigation[stage] || { mgSulfate: 0, kSulfate: 0 };
  let k_g_total, mg_g_total;
  if (mode === 'fp') {
    // FP fertigation: computeStageRecipe(stage) is the mass-balance derivation
    // from RECIPE_INPUTS. FP_RECIPE_T5.fertigation is the T5-only refined
    // override (currently zeroed — bank meets demand passively at T5). When
    // FP_RECIPE_T5 has a non-zero override for stage T5, prefer it; otherwise
    // fall back to computeStageRecipe so other stages get a meaningful FP value.
    const fpStage = computeStageRecipe(stage) || { mgSulfate: 0, kSulfate: 0 };
    if (stage === 'T5') {
      k_g_total  = (FP_RECIPE_T5.fertigation['K2SO4']      != null) ? FP_RECIPE_T5.fertigation['K2SO4']      : fpStage.kSulfate;
      mg_g_total = (FP_RECIPE_T5.fertigation['MgSO4-7H2O'] != null) ? FP_RECIPE_T5.fertigation['MgSO4-7H2O'] : fpStage.mgSulfate;
    } else {
      k_g_total  = fpStage.kSulfate;
      mg_g_total = fpStage.mgSulfate;
    }
  } else {
    const mK = getMultK(), mM = getMultMg();
    k_g_total  = storedFert.kSulfate * mK;
    mg_g_total = storedFert.mgSulfate * mM;
  }
  // Fertigation per m²/week, mg — barrel-loaded mass per m²/sem, full
  // delivery, no mixing-factor discount. Mode-aware mixing factor retired
  // 2026-05-10 (was 0.5 stored / 1.0 FP).
  const fertK  = (k_g_total  * PRODUCT_PCT.K2SO4_K)  / area * 1000;
  const fertMg = (mg_g_total * PRODUCT_PCT.MgSO4_Mg) / area * 1000;
  // Boric acid (Solubore) in fertigation — FP only, single-channel for B.
  // Non-ionic: 100% efficiency at pH 7,4 (REQ-018 OK), no Ksp pair, no chelate.
  const sb_fert_g = (mode === 'fp') ? (FP_RECIPE_T5.fertigation['Solubore'] || 0) : 0;
  const fertB  = (sb_fert_g * PRODUCT_PCT.Solubore_B) / area * 1000;

  // ─── REQ-116 — FP foliar recipe is live-derived from the pre-foliar gap.
  // In FP mode, BEFORE building the foliar branch, compute the residual gap
  // after compost + sidedress + fertigation, then call
  // computeFoliarRecipeForGap(gap, opts) and mutate FP_RECIPE_T5.foliar so
  // the existing FP foliar branch (which reads FP_RECIPE_T5.foliar) and all
  // downstream readers (renderPhase1Comparison Block 7 drift gauge,
  // "Recette proposée" admin card) see the live values.
  //
  // Stored mode is untouched — STORED_RECIPE.tomato.foliaire.A is
  // /retire-recipe-governed and not derived. Spec:
  // nutrition/tomato/foliar-recipe/spec.md → REQ-116. Implementation in
  // nutrition/tomato/foliar-recipe/calc.js → computeFoliarRecipeForGap.
  if (mode === 'fp') {
    // Pre-foliar fertigation supply per-element (mg/m²/wk).
    const fertPre = { K: fertK, Mg: fertMg };
    if (fertB > 0) fertPre.B = fertB;
    // Pre-foliar FP sidedress doses (mirrors the sidedress block below for
    // the FP branch only — duplicated minimally to keep the gap computation
    // inline; the canonical sidedress object is rebuilt below for the
    // returned `supply.sidedress` so admin views read identical values).
    const sdFp = {
      actisol_g: FP_RECIPE_T5.sidedress['Actisol-5-3-2'] || 0,
      farine_g:  FP_RECIPE_T5.sidedress['FarinePlumes']  || 0,
    };
    const sdAreaFactor_pre = 1000 / SIDEDRESS_AREA_PER_PLANCHE;
    const phLockoutFactor_P_pre = phLocked ? 0.10 : 0.50;
    const sidedressPre = {
      N: (sdFp.actisol_g * PRODUCT_PCT.Actisol_N    * SIDEDRESS_MINIMUM_EFFICIENCY.Actisol_N
        + sdFp.farine_g  * PRODUCT_PCT.FarinePlumes_N * SIDEDRESS_MINIMUM_EFFICIENCY.FarinePlumes_N
         ) * sdAreaFactor_pre,
      P: sdFp.actisol_g * PRODUCT_PCT.Actisol_P * phLockoutFactor_P_pre * sdAreaFactor_pre,
      K: sdFp.actisol_g * PRODUCT_PCT.Actisol_K * SIDEDRESS_MINIMUM_EFFICIENCY.Actisol_K * sdAreaFactor_pre,
    };
    // Compost release (g/m²/wk → mg/m²/wk). Source: window.CompostContribution
    // (REQ-080) — single source of truth, mirrors the gap chain in
    // nutrition/tomato/app/logic.js → buildNutriment.
    const CC_pre = (typeof window !== 'undefined' && window.CompostContribution) ? window.CompostContribution : null;
    const tf_pre = transpFactor || 1.0;
    const ty_pre = (typeof targetYield === 'number' && targetYield > 0) ? targetYield : 1.5;
    const demandPre = calculateNutritionDemand(ty_pre, stage, tf_pre);
    // Per-element pre-foliar gap = max(0, demand − compost − sidedress − fert).
    // Only foliar-relevant elements (Mn/Zn/Cu/Fe/Mo/B) need to be in the gap;
    // computeFoliarRecipeForGap ignores keys it doesn't recognize.
    const FOLIAR_ELS = ['Mn', 'Zn', 'Cu', 'Fe', 'Mo', 'B'];
    const gapPre = {};
    FOLIAR_ELS.forEach(function(element) {
      const dem = (demandPre[element] && demandPre[element].total) || 0;
      const compostMg_el = (CC_pre && CC_pre.releasePerWeek[element] != null) ? CC_pre.releasePerWeek[element] * 1000 : 0;
      const sdMg_el = sidedressPre[element] || 0;
      const fertMg_el = fertPre[element] || 0;
      gapPre[element] = Math.max(0, dem - compostMg_el - sdMg_el - fertMg_el);
    });
    // Operator levers — same DOM inputs the stored-mode foliar path reads
    // (REQ-112). Defaults match the function's declared defaults.
    const sprayCountInpFp = document.getElementById('nutr-foliar-spray-count');
    const surfactantInpFp = document.getElementById('nutr-foliar-surfactant');
    const foliarOptsFp = {
      sprayCount: sprayCountInpFp ? parseFloat(sprayCountInpFp.value) : 1,
      surfactant: surfactantInpFp ? surfactantInpFp.checked : false,
    };
    // Derive the gap-maximizing recipe and mutate FP_RECIPE_T5.foliar in-place.
    // Defensive: fall back to the existing literal if the call throws or
    // returns malformed (e.g., predictedCE not yet defined). Verifier guards
    // against this with a try/catch.
    try {
      const derived = window.FoliarRecipeTomato.computeFoliarRecipeForGap(gapPre, foliarOptsFp);
      if (derived && typeof derived === 'object') {
        FP_RECIPE_T5.foliar['MnSO4']        = derived.MnSO4_g    || 0;
        FP_RECIPE_T5.foliar['ZnSO4']        = derived.ZnSO4_g    || 0;
        FP_RECIPE_T5.foliar['CuSO4']        = derived.CuSO4_g    || 0;
        FP_RECIPE_T5.foliar['FeSO4-7H2O']   = derived.FeSO4_g    || 0;
        FP_RECIPE_T5.foliar['NaMolybdate']  = derived.NaMoO4_g   || 0;
        FP_RECIPE_T5.foliar['Solubore']     = derived.Solubore_g || 0;
      }
    } catch (e) {
      // Leave FP_RECIPE_T5.foliar at its prior value — the existing FP foliar
      // branch below reads it as a fallback. Logged to console so a real
      // breakage surfaces in dev.
      if (typeof console !== 'undefined') console.warn('[REQ-116] computeFoliarRecipeForGap failed; falling back to FP_RECIPE_T5.foliar literal:', e);
    }
  }

  // Foliar Spray A (weekly): delivered per-element mg/m²/wk under cuticle
  // coverage discount. Both modes route through
  // window.FoliarRecipeTomato.computeFoliarSupply — single source of
  // truth for the delivery formula (recipe_g × element_pct × 1000 / area
  // × coverage × sprayCount). REQ-101 (coverage) + REQ-103 (namespace) +
  // REQ-112 (sprayCount + surfactant + optional `recipe` arg) live in
  // nutrition/tomato/foliar-recipe/spec.md.
  // - Stored mode: no recipe arg → defaults to STORED_RECIPE.tomato.foliaire.A.
  // - FP mode: FP_RECIPE_T5.foliar (REQ-116-derived above from the live
  //   pre-foliar gap chain) is reshaped as a label-string array and
  //   passed as the third arg.
  const parseG = (s) => parseFloat(String(s).replace(',', '.')) || 0;
  const A = STORED_RECIPE.tomato.foliaire.A;
  const get = (substr) => A.find(x => x.name.includes(substr));

  // Per-product gram doses by mode — kept for raw{} traceability + the
  // "Recette proposée" Fe display label. NOT used to compute supply
  // anymore; supply flows through computeFoliarSupply for both modes.
  let mnSO4_g, znSO4_g, sb_g, cuSO4_g, moNa_g, feSO4_g;
  if (mode === 'fp') {
    const fp = FP_RECIPE_T5.foliar;
    mnSO4_g = fp['MnSO4']        || 0;
    znSO4_g = fp['ZnSO4']        || 0;
    sb_g    = fp['Solubore']     || 0;
    cuSO4_g = fp['CuSO4']        || 0;
    moNa_g  = fp['NaMolybdate']  || 0;
    feSO4_g = fp['FeSO4-7H2O']   || 0;
  } else {
    mnSO4_g = parseG(get('MnSO₄').master);
    znSO4_g = parseG(get('ZnSO₄').master);
    sb_g    = parseG(get('Solubore').master);
    cuSO4_g = parseG(get('CuSO₄').master);
    moNa_g  = parseG(get('Molybdate').master);
    const feSO4_entry = A.find(x => x.name.includes('FeSO₄'));
    feSO4_g = feSO4_entry ? parseG(feSO4_entry.master) : 0;
  }
  const feApplied_g = feSO4_g * PRODUCT_PCT.FeSO4_Fe;

  // Foliar mg/m²/week (effective after coverage × spray count).
  let foliar;
  if (mode === 'fp') {
    // FP mode: route the gap-derived FP_RECIPE_T5.foliar object through
    // computeFoliarSupply by reshaping it as a label-string array. The
    // substring-matched names below align with the `findG` searches in
    // calc.js ('MnSO₄', 'ZnSO₄', 'Solubore', 'CuSO₄', 'Molybdate',
    // 'FeSO₄'). Spray count + surfactant read from the same operator
    // inputs as stored-mode (foliarOptsFp built above is block-scoped to
    // the REQ-116 derivation block; re-read here to keep this branch
    // self-contained).
    const sprayCountInpFp2 = document.getElementById('nutr-foliar-spray-count');
    const surfactantInpFp2 = document.getElementById('nutr-foliar-surfactant');
    const foliarOptsFp2 = {
      sprayCount: sprayCountInpFp2 ? parseFloat(sprayCountInpFp2.value) : 1,
      surfactant: surfactantInpFp2 ? surfactantInpFp2.checked : false,
    };
    const fpFoliarArray = [
      { name: 'MnSO₄ (31,5 % Mn)',     master: (FP_RECIPE_T5.foliar['MnSO4']       || 0) + ' g' },
      { name: 'ZnSO₄ (35,5 % Zn)',     master: (FP_RECIPE_T5.foliar['ZnSO4']       || 0) + ' g' },
      { name: 'Solubore (20,5 % B)',   master: (FP_RECIPE_T5.foliar['Solubore']    || 0) + ' g' },
      { name: 'CuSO₄ (25 % Cu)',       master: (FP_RECIPE_T5.foliar['CuSO4']       || 0) + ' g' },
      { name: 'Molybdate (39,6 % Mo)', master: (FP_RECIPE_T5.foliar['NaMolybdate'] || 0) + ' g' },
      { name: 'FeSO₄·7H₂O (20 % Fe)',  master: (FP_RECIPE_T5.foliar['FeSO4-7H2O']  || 0) + ' g' },
    ];
    const supply = window.FoliarRecipeTomato.computeFoliarSupply(stage, foliarOptsFp2, fpFoliarArray);
    foliar = {
      Mn: supply.Mn, Zn: supply.Zn, B: supply.B,
      Cu: supply.Cu, Mo: supply.Mo, Fe: supply.Fe,
    };
  } else {
    // Stored mode: defaults read STORED_RECIPE.tomato.foliaire.A.
    // REQ-112: spray count + surfactant from the operator inputs in
    // Block 5; the function multiplies delivery accordingly.
    const sprayCountInp = document.getElementById('nutr-foliar-spray-count');
    const surfactantInp = document.getElementById('nutr-foliar-surfactant');
    const foliarOpts = {
      sprayCount: sprayCountInp ? parseFloat(sprayCountInp.value) : 1,
      surfactant: surfactantInp ? surfactantInp.checked : false,
    };
    const supply = window.FoliarRecipeTomato.computeFoliarSupply(stage, foliarOpts);
    foliar = {
      Mn: supply.Mn, Zn: supply.Zn, B: supply.B,
      Cu: supply.Cu, Mo: supply.Mo, Fe: supply.Fe,
    };
  }

  // Spray B (CaCl₂ anti-BER) removed 2026-05-06 — no foliar Ca contribution.
  // BER risk is addressed via ventilation + humidity control on the operations
  // side, not on the supply ledger. Block 5 lever for Ca reflects this.
  foliar.Ca = 0;

  // Soil contributions — direct mass-flow from SME × transpiration × canopy factor.
  // Lockout shows up automatically in the SME data (P 1.1 ppm, Mn/Zn below detection).
  // Fe gets a calcareous-chemistry discount inside soilWeeklyAvailable.
  // transpFactor (0,4-1,0) scales mass-flow down for stunted plants; full canopy = 1,0.
  //
  // Demand-bounding cap (LUXURY_FACTOR): mass-flow potential overstates real
  // uptake at high SME for transporter-saturating elements (K, Ca, Mg, partially
  // N). At saturating concentrations, real uptake ≈ demand × small luxury
  // fraction; the rest stays on CEC, in solution, or leaches. The cap is taken
  // against demand_total (fruit + biomass per stage at target yield) — same
  // number Block 1 of the Nutrition page renders. For solution-limited elements
  // (P at SME 1.1 ppm, Fe/Mn/Zn under detection), mass-flow IS the bottleneck
  // and the cap doesn't bind.
  const tf = transpFactor || 1.0;
  const ty = (typeof targetYield === 'number' && targetYield > 0) ? targetYield : 1.5;
  // REQ-081: pass tf so Ca/Mg biomass terms scale with canopy transpiration.
  const demandBreakdown = calculateNutritionDemand(ty, stage, tf);
  const soil = {};
  // FP mode (2026-05-08): drop SME credit for everything fertigation/foliar can
  // deliver (K, Mg, N, Fe, Mn, Zn, B, Cu, Mo). Keep SME for Ca (saturated, can't
  // add) and P (pH-locked, banque scavenging is the accepted strategy via
  // ACCEPTED_DEFICITS). Stored mode unchanged — SME-based supply for all elements.
  const FP_SOIL_KEEP = { Ca: true, P: true };
  ['N','P','K','Ca','Mg','Fe','Mn','Zn','B','Cu','Mo'].forEach(element => {
    if (mode === 'fp' && !FP_SOIL_KEEP[element]) {
      soil[element] = 0;
      return;
    }
    const massFlowPotential = soilWeeklyAvailable(element, phLocked, tf);
    const demandTotal_element = (demandBreakdown[element] && demandBreakdown[element].total) || 0;
    const luxury = (LUXURY_FACTOR[element] != null) ? LUXURY_FACTOR[element] : 1.0;
    const demandCap = demandTotal_element * luxury;
    soil[element] = Math.min(massFlowPotential, demandCap);
  });

  // Side-dressing contributions (granular, weekly, per stage). Reads from
  // STORED_RECIPE.tomato.sidedress source-of-truth constant. Per-element delivery:
  //   element_mg/m²/wk = (g/planche × pct × min_eff × phFactor) / planche_area × 1000
  // Mineralization steady-state: weekly application = weekly available release.
  //
  // P pH-lockout factor (audit Finding 7, cert 3): at pH ≥ 7, freshly
  // mineralized phosphate from Actisol meets Ca²⁺ in solution and precipitates
  // as Ca-phosphate before plant uptake. Cadre framework gives 5-15% effective
  // (midpoint ~10%); we apply 0.10 when phLocked, 0.50 (full mineralization
  // efficiency) when pH drops. This stays honest under the new model since
  // sidedress no longer claims this-week supply — only bank-maintenance addition.
  // Sidedress source: stored = STORED_RECIPE.tomato.sidedress[stage],
  // fp = FP_RECIPE_T5.sidedress (FP_RECIPE_T5 is T5-only; same g/planche unit).
  const sd = mode === 'fp'
    ? {
        actisol_g: FP_RECIPE_T5.sidedress['Actisol-5-3-2'] || 0,
        farine_g:  FP_RECIPE_T5.sidedress['FarinePlumes']  || 0,
      }
    : STORED_RECIPE.tomato.sidedress[stage];
  const sdAreaFactor = 1000 / SIDEDRESS_AREA_PER_PLANCHE; // → mg/m²/wk per gram of product
  const phLockoutFactor_P = phLocked ? 0.10 : 0.50;
  const sidedress = {
    N: (sd.actisol_g * PRODUCT_PCT.Actisol_N    * SIDEDRESS_MINIMUM_EFFICIENCY.Actisol_N
      + sd.farine_g  * PRODUCT_PCT.FarinePlumes_N * SIDEDRESS_MINIMUM_EFFICIENCY.FarinePlumes_N
       ) * sdAreaFactor,
    P: sd.actisol_g * PRODUCT_PCT.Actisol_P * phLockoutFactor_P * sdAreaFactor,
    K: sd.actisol_g * PRODUCT_PCT.Actisol_K * SIDEDRESS_MINIMUM_EFFICIENCY.Actisol_K * sdAreaFactor,
  };
  sidedress.efficiency = window.SidedressRecipeTomato.efficiency;

  // Fertigation contributions — barrel-loaded mass per m²/sem, full
  // delivery (no mixing-factor discount; concept retired 2026-05-10).
  // B only present in FP mode (Solubore added 2026-05-08, single-channel for B).
  const fert = { K: fertK, Mg: fertMg };
  if (fertB > 0) fert.B = fertB;
  fert.efficiency = window.FertigationRecipeTomato.efficiency;

  // REQ-157 (amended 2026-05-16) — capability map for the foliar channel
  // sourced from window.FoliarRecipeTomato. Declares per-element coverage
  // regardless of whether the channel doses the element this call.
  // REQ-163 — surfactant-aware: thread the Block 5 surfactant lever through
  // efficiencyFor(surfactant) so the Efficacité column updates on toggle.
  const surfactantInputForEfficiency = document.getElementById('nutr-foliar-surfactant');
  const surfactantOnForEfficiency = surfactantInputForEfficiency ? surfactantInputForEfficiency.checked : false;
  foliar.efficiency = window.FoliarRecipeTomato.efficiencyFor(surfactantOnForEfficiency);

  // Total effective supply per element.
  // NOTE: sidedress is NOT summed here — past sidedress mineralization is
  // already captured in the SME reading (supply.soil). Adding it again would
  // double-count. Sidedress.* still computed; rendered in Block 3 as a bank-
  // maintenance view (drawdown vs. addition determines SME trajectory).
  const total = {};
  Object.keys(TOMATO_FRUIT_EXPORT).forEach(element => {
    total[element] = (fert[element] || 0) + (foliar[element] || 0) + (soil[element] || 0);
  });

  // Fe display label — uses the active recipe source (stored or fp).
  const feSourceLabel = feSO4_g > 0 ? `FeSO₄ ${feSO4_g} g` : '—';

  return {
    total, fert, foliar, soil, sidedress,
    raw: {
      mnSO4_g, znSO4_g, sb_g, cuSO4_g, moNa_g, feApplied_g, feSO4_g,
      k_g_total, mg_g_total, feSourceLabel, area,
      sd_actisol_g: sd.actisol_g, sd_farine_g: sd.farine_g,
    }
  };
}

function statusFor(supply, demand) {
  if (demand <= 0) return { icon: '—', cls: '', ratio: 1 };
  const ratio = supply / demand;
  if (ratio >= 1.0)  return { icon: '✅', cls: 'cert-5', ratio };
  if (ratio >= 0.7)  return { icon: '⚠',  cls: 'cert-3', ratio };
  return                    { icon: '❌', cls: 'cert-2', ratio };
}

function fmtMg(v) {
  if (v === 0) return '0';
  if (v >= 1000) return (v / 1000).toFixed(2) + ' g';
  if (v >= 10)   return Math.round(v).toString();
  if (v >= 1)    return v.toFixed(1);
  return v.toFixed(2);
}

// Top-level Nutrition page dispatch. Picks the crop-specific page builder
// based on the current `nutrCrop` toggle. Tomato uses the stage-driven Bilan
// (nutrition/tomato/app/logic.js); Salanova uses the continuous post-transplant
// model (nutrition/lettuce/app/logic.js); Semis uses the per-tray nursery
// model (defined below). Each crop's logic.js is single-purpose — the
// dispatch lives here at the integrator boundary.
function buildNutriment() {
  if (nutrCrop === 'lettuce') {
    buildNutrimentLettuce();
    return;
  }
  if (nutrCrop === 'nursery') {
    buildNutrimentNursery();
    return;
  }
  buildNutrimentTomato();
}

// Switch between Tomate / Salanova / Semis laitue on the Nutrition page.
function setNutrCrop(crop) {
  nutrCrop = crop;
  const tomBtn = document.getElementById('nutr-crop-tomato');
  const letBtn = document.getElementById('nutr-crop-lettuce');
  const nurBtn = document.getElementById('nutr-crop-nursery');
  if (tomBtn) tomBtn.className = crop === 'tomato'  ? 'crop-btn active-tomato'  : 'crop-btn';
  if (letBtn) letBtn.className = crop === 'lettuce' ? 'crop-btn active-lettuce' : 'crop-btn';
  if (nurBtn) nurBtn.className = crop === 'nursery' ? 'crop-btn active-lettuce' : 'crop-btn';
  const tomDiv = document.getElementById('nutr-tomato-content');
  const letDiv = document.getElementById('nutr-lettuce-content');
  const nurDiv = document.getElementById('nutr-nursery-content');
  if (tomDiv) tomDiv.style.display = crop === 'tomato'  ? 'block' : 'none';
  if (letDiv) letDiv.style.display = crop === 'lettuce' ? 'block' : 'none';
  if (nurDiv) nurDiv.style.display = crop === 'nursery' ? 'block' : 'none';
  if (typeof syncHash === 'function') syncHash();
  syncNutrRecipeModeUI();
  buildNutriment();
}
