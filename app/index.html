// FP recipe (T5 only — refined 2026-05-08 to mass-balance pure, no soil credit).
// Single source of truth for the Phase 1 comparison (Block 6) and the bank-
// trajectory view on the Banque sol page. Recette proposée (renderProposedRecipe)
// is the team-facing rendering of these same numbers.
//
// PHILOSOPHY (2026-05-08): FP no longer takes credit from SME mass-flow for the
// elements that fertigation/foliar can deliver (K, Mg, N, Fe, Mn, Zn, B, Cu, Mo).
// Soil contribution is kept ONLY for Ca (saturated, can't add more) and P (no
// viable channel — banque scavenging is the accepted strategy). Rationale:
// SME is uncertain (mass-flow factor cert 2-3, transpiration cert 3, lockout
// chemistry cert 3-4); using it as supply credit silently under-doses fertigation
// when SME is wrong. Mass-balance — replenish offtake regardless of bank — is
// the safer organic-soil strategy.
//
// Fertigation: K + Mg + Solubore (B). K and Mg values populated at boot
// from computeStageRecipe('T5') via wireFpFertigation() (REQ-154 — mirror
// the mass-balance derivation by construction). Solubore hand-coded —
// single-channel B at T5 (REQ-061), non-ionic so 100% efficient at any
// pH (REQ-018 OK), 9 × 0.205 / 382.9 × 1000 = 4.82 mg/m²/sem = 107% T5
// demand. Foliaire B = 0. Ecocert validated 2026-05-08.
// Sidedress: farine alone — Actisol dropped (Ca-aware, soil saturated).
//   FarinePlumes 1 655 g/planche/sem (cert 3): wired live from
//   computeStageSidedress(T5). N offtake 4 050 − compost 1 100 = 2 950 mg/m²/sem.
//   2 950 / (0.13 × 0.75) ÷ 1000 × 54.7 m² = 1 655 g.
// Foliar: burn-safe doses without yucca (delivers 60-100% of demand per element).
//   Mn 18 g = ~60% demand (cap by toxicity pooling without surfactant).
//   Zn 16 g = ~100% demand.
//   Cu 2 g = ~25% demand (capped by Cu toxicity observed without yucca).
//   Solubore 0 — fertigation owns B (single-channel design).
//   Mo 0.5 g = ~100% demand (wide tolerance).
//   Fe 90 g FeSO₄·7H₂O = ~95% demand (cuticle uptake bypasses soil lockout).
const FP_RECIPE_T5 = {
  // .fertigation: placeholders — overwritten at script load by
  // wireFpFertigation() in nutrition/tomato/fertigation-recipe/calc.js
  // (single source of truth = FIRST_PRINCIPLES_T5_FERTIGATION in
  // nutrition/tomato/fertigation-recipe/data.js). Spec: REQ-098 / REQ-099.
  fertigation: {
    'K2SO4':          0,      // populated at boot from computeStageRecipe('T5').kSulfate (REQ-154)
    'MgSO4-7H2O':     0,      // populated at boot from computeStageRecipe('T5').mgSulfate (REQ-154)
    'Solubore':       9,      // boric acid non-ionic, 100% efficiency at pH 7,4 — sole B channel
  },
  sidedress: {
    'Actisol-5-3-2': 0,      // dropped — Ca-saturated soil
    'FarinePlumes':  1300,   // placeholder — wired live from computeStageSidedress at script load
  },
  foliar: {
    'MnSO4':       18,        // burn-safe cap, ~60% demand
    'ZnSO4':       16,        // burn-safe cap, ~100% demand
    'CuSO4':        2,        // burn-safe cap, ~25% demand
    'Solubore':     0,        // fertigation owns B (single-channel)
    'NaMolybdate':  0.5,      // wide tolerance
    'FeSO4-7H2O':  90,        // ~95% demand
  },
};
