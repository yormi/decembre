name: Notifier Catherine pour révision

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read

jobs:
  notify:
    # Skip while PR is draft — Guillaume controls timing by flipping
    # draft → ready (which fires `ready_for_review` and pings Catherine).
    # Pushes to a draft PR no longer notify.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Construire l'URL de l'aperçu Netlify
        id: preview
        run: |
          echo "url=https://deploy-preview-${{ github.event.pull_request.number }}--decembre-staging.netlify.app" >> "$GITHUB_OUTPUT"

      - name: Attendre que l'aperçu Netlify soit prêt
        run: |
          URL="${{ steps.preview.outputs.url }}"
          for i in $(seq 1 60); do
            CODE=$(curl -sL -o /dev/null -w '%{http_code}' "$URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Aperçu prêt : $URL"
              exit 0
            fi
            echo "Tentative $i — code $CODE — on attend 10s"
            sleep 10
          done
          echo "::warning::Aperçu pas confirmé après 10 min, on envoie quand même"

      - name: Préparer et envoyer le message à #review
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_REVIEW }}
        run: |
          set -euo pipefail

          # Extract the "## Ce qui change" bullets (up to the next "## " heading);
          # convert markdown "- " to a real bullet glyph for Slack.
          CHANGES=$(printf '%s\n' "$PR_BODY" | awk '/^## Ce qui change/{flag=1; next} /^## /{flag=0} flag' | grep -vE '^<!--|^$' | sed 's/^- /• /' || true)

          if [ -z "$CHANGES" ]; then CHANGES="(aucun résumé fourni)"; fi

          HEADER_TEXT="Nouvelle version de l'app Décembre"
          LINK_TEXT="Ouvrir l'aperçu"
          FOOTER_TEXT="Réponds dans ce fil quand c'est bon pour publier."

          jq -n \
            --arg header "$HEADER_TEXT" \
            --arg changes "$CHANGES" \
            --arg preview "$PREVIEW_URL" \
            --arg linktext "$LINK_TEXT" \
            --arg footer "$FOOTER_TEXT" \
            '{
              username: $header,
              icon_emoji: ":robot_face:",
              text: $header,
              blocks: [
                {type:"section",text:{type:"mrkdwn",text:$changes}},
                {type:"section",text:{type:"mrkdwn",text:("<" + $preview + "|:link: " + $linktext + ">")}},
                {type:"context",elements:[{type:"mrkdwn",text:$footer}]}
              ]
            }' > payload.json

          WEBHOOK=$(printf '%s' "$SLACK_WEBHOOK" | tr -d '\r\n[:space:]')
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data @payload.json \
            "$WEBHOOK"
