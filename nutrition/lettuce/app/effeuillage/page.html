<div id="page-effeuillage-content" style="display:none;">

  <!-- Static crop context chip (tomato-only — not a toggle). -->
  <div class="crop-toggle">
    <div class="crop-btn active-tomato" style="cursor:default;">
      <span class="crop-icon">🍅</span> Tomates
    </div>
  </div>

  <div class="card">
    <div class="card-title">Toujours effeuiller</div>

    <div style="display:flex; gap:14px; align-items:center; padding:6px 0;">
      <div style="flex:1; font-size:13px; line-height:1.5; color:var(--text);">
        Feuilles <strong>malades ou abîmées à plus du 1/3</strong>.
      </div>
      <img src="effeuillage/images/feuille-malade.png" alt="Feuille malade sur plus du tiers" style="width:96px; height:96px; flex-shrink:0; border-radius:50%;">
    </div>

    <div style="display:flex; gap:14px; align-items:center; padding:6px 0; margin-top:10px; padding-top:14px; border-top:1px solid var(--border);">
      <div style="flex:1; font-size:13px; line-height:1.5; color:var(--text);">
        Feuilles qui iraient dans le <strong>rack à tige</strong>.
      </div>
      <img src="effeuillage/images/rack-tige.png" alt="Enlever les feuilles du bas, vers le rack à tige" style="width:96px; height:96px; flex-shrink:0; border-radius:50%;">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Ensuite — feuilles à hauteur des épaules</div>

    <div style="font-size:13px; line-height:1.5; color:var(--text); margin-bottom:14px;">
      Mesurer une feuille avec le bras.
    </div>

    <img src="effeuillage/images/avant-bras.png" alt="Mesure du bout du majeur au coude" style="display:block; width:100%; max-width:260px; margin:0 auto 16px; border-radius:var(--radius-sm);">

    <div style="font-size:12px; color:var(--text-muted); margin-bottom:8px;">Où arrive la feuille par rapport au coude ?</div>

    <div class="stage-selector" id="reach-selector" style="margin-bottom:12px;">
      <button class="stage-btn" id="reach-elbow" onclick="setLeafReach('elbow')">
        <span class="stage-label">Atteint le coude</span>
      </button>
      <button class="stage-btn" id="reach-near" onclick="setLeafReach('near')">
        <span class="stage-label">Manque &lt; 2 po</span>
      </button>
      <button class="stage-btn" id="reach-short" onclick="setLeafReach('short')">
        <span class="stage-label">Manque 2 po +</span>
      </button>
    </div>

    <div id="reach-result">
      <div style="font-size:12px; color:var(--text-muted); padding:4px 2px;">Choisir une option ci-dessus pour voir quoi faire.</div>
    </div>
  </div>

</div><!-- end page-effeuillage-content -->
