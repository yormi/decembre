    <div id="sol-tomato-content">

      <!-- Side-dressing — only the current-stage recipe, sourced from
           STORED_RECIPE.tomato.sidedress (per-stage). Stage auto-derived from
           getStageFromWeek(getWeekNumber()) — same logic as autoStage().
           Scannable layout: stage chip + big-number dose blocks, one per
           active product. Zero-dose products hidden. -->
      <div class="card">
        <div style="display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:18px;">
          <div class="card-title" style="margin-bottom:0;">Engrais sol tomate</div>
          <span id="sol-tomato-stage-chip" style="background:var(--accent-active-light); border:1.5px solid var(--accent-active-border); color:var(--text); font-size:12px; font-weight:600; padding:4px 10px; border-radius:4px; white-space:nowrap;">—</span>
        </div>
        <div id="sol-tomato-doses" style="display:flex; flex-wrap:wrap; gap:16px;">—</div>
      </div>

    </div><!-- end sol-tomato-content -->

    <script>
      (function renderSolTomatoSidedress() {
        function render() {
          var stageLabels = {
            T1: 'début du cycle',
            T2: 'installation',
            T3: 'floraison précoce',
            T4: 'fructification',
            T5: 'pleine production',
          };
          var productLabels = {
            actisol_g: 'Actisol 5-3-2',
            farine_g:  'Farine de plumes 13-0-0',
            alfalfa_g: 'Luzerne moulue',
            frass_g:   'Frass d’insectes',
          };
          var chipElement  = document.getElementById('sol-tomato-stage-chip');
          var dosesElement = document.getElementById('sol-tomato-doses');
          if (!chipElement || !dosesElement) return;
          if (typeof getWeekNumber !== 'function' || typeof getStageFromWeek !== 'function') return;
          if (!window.STORED_RECIPE || !window.STORED_RECIPE.tomato || !window.STORED_RECIPE.tomato.sidedress) return;

          var week  = getWeekNumber();
          var stage = getStageFromWeek(week);
          var label = stageLabels[stage] || '';
          chipElement.innerHTML =
            '<span style="font-size:14px;">' + stage + '</span>' +
            (label ? ' · ' + label : '') +
            ' <span style="color:var(--text-muted); font-weight:400;">· sem ' + week + '</span>';

          var stageRecipe = window.STORED_RECIPE.tomato.sidedress[stage] || {};
          var cards = [];
          Object.keys(stageRecipe).forEach(function (productKey) {
            var grams = stageRecipe[productKey];
            if (!(grams > 0)) return;
            var name = productLabels[productKey] || productKey;
            cards.push(
              '<div style="flex:1 1 220px; min-width:200px; padding:14px 16px; border:1.5px solid var(--accent-active-border); border-radius:6px; background:var(--accent-active-light);">' +
                '<div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; margin-bottom:6px;">' + name + '</div>' +
                '<div style="font-family:\'DM Mono\',monospace; font-size:32px; font-weight:700; color:var(--text); line-height:1.1;">' +
                  Math.round(grams).toLocaleString('fr-CA') + ' <span style="font-size:18px; font-weight:600;">g</span>' +
                '</div>' +
                '<div style="font-size:11.5px; color:var(--text-muted); margin-top:4px;">par planche · chaque semaine</div>' +
              '</div>'
            );
          });
          dosesElement.innerHTML = cards.length
            ? cards.join('')
            : '<div style="color:var(--text-muted); font-size:13px;">Aucun produit actif dans la recette stockée pour ' + stage + '.</div>';
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', render);
        } else {
          render();
        }
      })();
    </script>
